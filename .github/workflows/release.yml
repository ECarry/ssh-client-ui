name: "Release App"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # 1. macOS - Apple Silicon (M1/M2/M3/M4)
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'

          # 2. macOS - Intel CPU (x86_64)
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'

          # 3. Linux
          - platform: 'ubuntu-22.04'
            args: ''

          # 4. Windows
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 配置 Node.js 环境及 npm 缓存
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      # 2. 配置 Rust 工具链
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # 3. Rust 编译缓存
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # 4. 安装 Linux 系统编译依赖 (仅 Ubuntu 必备)
      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      # 5. 安装前端依赖
      - name: Install frontend dependencies
        run: npm ci

      # 6. 使用适配 Tauri v2 的 tauri-action
      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v0.5 # 👈 这里切换到了适配 v2 的 Action
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Ferric ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}